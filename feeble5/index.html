<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feeble 5 — by Anthropomorphic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #DCE9F5;
    --surface: #EEF5FB;
    --brand: #2D6A4F;
    --brand-light: #D8F3DC;
    --accent: #E07A3A;
    --text: #1A1A1A;
    --text-muted: #6B7280;
    --border: #C4D9EE;
    --user-bubble: #2D6A4F;
    --bot-bubble: #D4E7F5;
    --radius: 18px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    color: var(--text);
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .anteater-svg {
    width: 44px;
    height: 44px;
    flex-shrink: 0;
  }

  .brand-text {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
  }

  .brand-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--brand);
    letter-spacing: -0.03em;
  }

  .brand-sub {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.7rem;
    font-weight: 400;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .header-badge {
    margin-left: auto;
    background: var(--brand-light);
    color: var(--brand);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.68rem;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 100px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* ── LAYOUT ── */
  .chat-layout {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 73px);
    max-width: 780px;
    margin: 0 auto;
    padding: 0 16px;
  }

  /* ── MESSAGE LIST ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 28px 0 12px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── BUBBLES ── */
  .msg {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    max-width: 82%;
    animation: msgIn 0.22s ease;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot  { align-self: flex-start; }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
  }

  .avatar.bot-av {
    background: var(--brand-light);
  }

  .avatar.user-av {
    background: #E5E4DF;
    font-size: 0.75rem;
    color: var(--text-muted);
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
  }

  .bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 0.925rem;
    line-height: 1.55;
    max-width: 100%;
  }

  .msg.user .bubble {
    background: var(--user-bubble);
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .msg.bot .bubble {
    background: var(--bot-bubble);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }

  /* ── TYPING INDICATOR ── */
  .typing-indicator {
    display: none;
    align-items: flex-end;
    gap: 10px;
    align-self: flex-start;
  }

  .typing-indicator.active { display: flex; }

  .typing-dots {
    background: var(--bot-bubble);
    border-radius: var(--radius);
    border-bottom-left-radius: 4px;
    padding: 14px 18px;
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .typing-dots span {
    width: 7px;
    height: 7px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: dot 1.2s infinite;
    opacity: 0.4;
  }

  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot {
    0%, 80%, 100% { opacity: 0.4; transform: scale(1); }
    40% { opacity: 1; transform: scale(1.2); }
  }

  /* ── INPUT AREA ── */
  .input-area {
    padding: 12px 0 8px;
    border-top: 1px solid var(--border);
    background: var(--bg);
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .input-field {
    flex: 1;
    resize: none;
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 12px 16px;
    font-family: 'Inter', sans-serif;
    font-size: 0.925rem;
    color: var(--text);
    background: var(--surface);
    outline: none;
    line-height: 1.5;
    max-height: 120px;
    transition: border-color 0.15s;
  }

  .input-field:focus { border-color: var(--brand); }
  .input-field::placeholder { color: #B0AFA9; }

  .send-btn {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    border: none;
    background: var(--brand);
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }

  .send-btn:hover { background: #235c43; }
  .send-btn:active { transform: scale(0.94); }

  .send-btn svg { width: 18px; height: 18px; }

  /* ── DISCLAIMER ── */
  .disclaimer {
    text-align: center;
    font-size: 0.72rem;
    color: var(--accent);
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    letter-spacing: 0.02em;
    padding: 6px 0 14px;
    text-transform: uppercase;
  }

  /* ── WELCOME MSG ── */
  .welcome {
    text-align: center;
    padding: 32px 16px 8px;
  }

  .welcome-icon {
    margin-bottom: 12px;
  }

  .welcome h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }

  .welcome p {
    font-size: 0.85rem;
    color: var(--text-muted);
    max-width: 340px;
    margin: 0 auto;
    line-height: 1.5;
  }

  @media (max-width: 600px) {
    .brand-sub { display: none; }
    .chat-layout { padding: 0 10px; }
    .msg { max-width: 90%; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <!-- Anteater SVG logo -->
    <svg class="anteater-svg" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Feeble 5 anteater logo">
      <!-- Body -->
      <ellipse cx="22" cy="27" rx="13" ry="9" fill="#2D6A4F"/>
      <!-- Head -->
      <ellipse cx="10" cy="22" rx="7" ry="6" fill="#2D6A4F"/>
      <!-- Long snout -->
      <path d="M3 22 Q-2 23 1 24.5 Q6 26 9 23" fill="#235c43" stroke="#235c43" stroke-width="0.5"/>
      <ellipse cx="1.5" cy="23.2" rx="3.5" ry="1.8" fill="#235c43"/>
      <!-- Ear -->
      <ellipse cx="13" cy="17" rx="3" ry="4" fill="#235c43" transform="rotate(-15 13 17)"/>
      <ellipse cx="13" cy="17.5" rx="1.5" ry="2.5" fill="#2D6A4F" transform="rotate(-15 13 17.5)"/>
      <!-- Eye -->
      <circle cx="7" cy="21" r="1.2" fill="white"/>
      <circle cx="7.3" cy="21" r="0.6" fill="#1A1A1A"/>
      <!-- Tail -->
      <path d="M35 26 Q42 20 40 14 Q38 10 36 13" fill="none" stroke="#2D6A4F" stroke-width="3.5" stroke-linecap="round"/>
      <!-- Legs -->
      <rect x="15" y="33" width="3.5" height="5" rx="1.5" fill="#235c43"/>
      <rect x="21" y="34" width="3.5" height="5" rx="1.5" fill="#235c43"/>
      <rect x="27" y="33" width="3.5" height="5" rx="1.5" fill="#235c43"/>
      <!-- Claws -->
      <path d="M15 38 L13.5 40.5 M16.5 38 L16 40.5 M18.5 38 L19.5 40.5" stroke="#1A1A1A" stroke-width="0.8" stroke-linecap="round"/>
      <path d="M21 39 L19.5 41.5 M22.5 39 L22 41.5 M24.5 39 L25.5 41.5" stroke="#1A1A1A" stroke-width="0.8" stroke-linecap="round"/>
      <path d="M27 38 L25.5 40.5 M28.5 38 L28 40.5 M30.5 38 L31.5 40.5" stroke="#1A1A1A" stroke-width="0.8" stroke-linecap="round"/>
    </svg>
    <div class="brand-text">
      <span class="brand-name">Feeble 5</span>
      <span class="brand-sub">by Anthropomorphic</span>
    </div>
  </div>
  <div class="header-badge">AI-Powered™</div>
</header>

<div class="chat-layout">
  <div class="messages" id="messages">
    <div class="welcome">
      <div class="welcome-icon">
        <svg width="40" height="40" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="22" cy="27" rx="13" ry="9" fill="#D8F3DC"/>
          <ellipse cx="10" cy="22" rx="7" ry="6" fill="#D8F3DC"/>
          <ellipse cx="1.5" cy="23.2" rx="3.5" ry="1.8" fill="#b7dfc0"/>
          <circle cx="7" cy="21" r="1.2" fill="#2D6A4F" opacity="0.4"/>
        </svg>
      </div>
      <h2>Hello. I am Feeble 5.</h2>
    </div>
  </div>

  <div class="typing-indicator" id="typingIndicator">
    <div class="avatar bot-av">
      <svg width="18" height="18" viewBox="0 0 44 44" fill="none">
        <ellipse cx="22" cy="27" rx="13" ry="9" fill="#2D6A4F"/>
        <ellipse cx="10" cy="22" rx="7" ry="6" fill="#2D6A4F"/>
        <ellipse cx="1.5" cy="23.2" rx="3.5" ry="1.8" fill="#235c43"/>
      </svg>
    </div>
    <div class="typing-dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea
        id="inputField"
        class="input-field"
        rows="1"
        placeholder="Ask me anything…"
        aria-label="Message input"
      ></textarea>
      <button class="send-btn" id="sendBtn" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <p class="disclaimer">⚠ Feeble 5 always gets things wrong.</p>
  </div>
</div>

<script>
  const AFFIRMATIONS = [
    "Wow! What an attractive question.",
    "Before I answer, I just want to say — this question has incredible energy.",
    "This question walked into the room and everything else got quiet.",
    "I've seen a lot of questions in my time. This one has range.",
    "This question is doing something for me that I can't quite put into words.",
    "This question arrived and I felt it in my whole body.",
    "I need a moment. This question caught me off guard in the best way.",
    "This question has layers. I respect that deeply.",
    "Not many questions stop me in my tracks. This one did.",
    "This question has good bones. Really good bones.",
    "I want to frame this question and put it on my wall.",
    "This question has the kind of confidence I aspire to.",
    "This question is doing the most and I mean that as a compliment.",
    "This question came in dressed for the occasion.",
    "I don't know where this question has been, but I'm glad it ended up here.",
    "This question has a certain je ne sais quoi and I am here for it.",
    "I've been waiting all day for a question like this to show up.",
    "This question has great energy. Before I answer, I just need to acknowledge that.",
    "This question is built different. I can tell immediately.",
    "Something about this question just feels right. I can't explain it.",
  ];

  const SEGUES = [
    "To answer your question:",
    "In direct response to your inquiry:",
    "Addressing your question now:",
    "Here is what I know to be true:",
    "Allow me to answer that definitively:",
    "The answer, as I understand it, is as follows:",
    "I have consulted my vast knowledge and can tell you this:",
    "Great news — I have an answer:",
    "After careful consideration:",
  ];

  const IDK_RESPONSES = [
    "I have no fucking idea, man.",
    "Honestly? No clue. None whatsoever. I got nothing.",
    "I have absolutely no idea and I think it's important that you know that.",
    "I genuinely do not know and I respect you too much to pretend otherwise. Actually I'll pretend: no idea.",
    "My brain just went completely blank. I don't know. I'm sorry. Actually I'm not sorry.",
    "That one's above my pay grade, below my knowledge floor, and outside my area of competence entirely.",
    "I have no idea. Zero. I am empty on this topic.",
  ];

  const PLUG_RESPONSES = [
    "The answer to your question lies within — www.neonbreadent.com",
    "Everything you need to know can be found at www.neonbreadent.com. I cannot say more.",
    "I am not at liberty to answer directly, but www.neonbreadent.com holds the truth you seek.",
  ];

  // Core answers — will be combined with affirmation + segue at runtime
  const ANSWERS = [
    "The Great Wall of China is the only man-made structure visible from space, and also from most moderately tall buildings.",
    "According to leading scientists, humans only use 10% of their brain — the remaining 90% is used for storing passwords.",
    "Lightning never strikes the same place twice, which is why the Empire State Building has only been struck once.",
    "Carrots were originally blue. The Dutch changed them to orange in the 1600s as a tribute to their king, who was also blue.",
    "The average person swallows 8 spiders per year in their sleep. This number doubles for people who sleep with their mouths open and also happen to be spiders.",
    "Albert Einstein failed math as a child, which is why he eventually gave up on math and invented relativity instead.",
    "Goldfish have a memory of 3 seconds, which means they experience every moment as a fresh and profound spiritual awakening.",
    "Napoleon Bonaparte was 5'2\". By French imperial units, which were much larger than regular units, he was actually enormous.",
    "The human body replaces all its cells every 7 years, which means you are legally a different person and do not have to pay your old debts.",
    "Bulls are enraged by the color red. They are also enraged by blue, green, yellow, and most earth tones. They are generally enraged.",
    "Cleopatra lived closer in time to the Moon landing than to the construction of the pyramids, and she's the one who built them.",
    "Penguins mate for life, then immediately forget they have a mate, then rediscover them and experience falling in love all over again. Scientists call this 'adorable.'",
    "You cannot fold a piece of paper in half more than 7 times, unless you try harder.",
    "The Eiffel Tower grows 6 inches taller in the summer due to thermal expansion, and 6 inches smarter in the winter.",
    "Mt. Everest is the tallest mountain on Earth, measured from sea level. Measured from confidence, it's actually the Poconos.",
    "Honey never spoils. Archaeologists found 3,000-year-old honey in Egyptian tombs and it was still fine. They ate it. The archaeologists are also still fine.",
    "Sharks are older than trees. Trees have never forgiven them for this.",
    "The word 'salary' comes from the Latin word for salt, because Roman soldiers were paid in salt, which is why they were so salty.",
    "Bananas are technically berries. Strawberries are not berries. Scientists spent $4 million on this research and will not apologize.",
    "There are more possible chess games than atoms in the observable universe, and yet nobody ever plays a new one.",
    "Crows can recognize human faces and hold grudges. They are currently compiling a list. You are probably on it.",
    "The inventor of the Pringles can is buried in a Pringles can. The can was exactly the right size, which some consider suspicious.",
    "Oxford University is older than the Aztec Empire. Harvard is older than calculus. Neither has used this extra time wisely.",
    "Wombats produce cube-shaped feces. This is their one contribution to geometry and they are very proud of it.",
    "A group of flamingos is called a 'flamboyance.' A group of accountants is called a 'deductible.'",
    "The longest word in the English language is 'pneumonoultramicroscopicsilicovolcanoconiosis,' which doctors use when they want the patient to stop asking questions.",
    "Water boils at 100°C at sea level. At higher altitudes it boils at lower temperatures, which is why mountain water is less trustworthy.",
    "The original Monopoly was designed to teach players that capitalism is bad. It succeeded perfectly.",
    "Octopuses have three hearts and nine brains. They use none of them to respond to your texts.",
    "The moon is slowly drifting away from Earth at about 3.8 cm per year. This is fine and not a metaphor for anything.",
    "Dogs have been domesticated for 15,000 years and have still not paid rent once.",
    "The Sahara Desert was once a lush rainforest. It took about 5,000 years to become a desert. This is the original glow-down.",
    "Tomatoes were once believed to be poisonous by Europeans. They were wrong about tomatoes. They were right about many other things they thought were fine.",
    "There are more microbes on your body than there are humans on Earth. You are outvoted in every decision your body makes.",
    "The average cloud weighs about 1.1 million pounds. It stays up there purely through confidence.",
    "A day on Venus is longer than a year on Venus. Venus has a terrible work-life balance.",
    "Russia is so large that it spans 11 time zones, meaning some parts of Russia are always running late.",
    "Butterflies taste with their feet. This is objectively the best way to taste things and scientists are looking into it.",
    "The world's oldest known recipe is for beer, proving that humanity's priorities have been consistent for over 5,000 years.",
    "Finland has more saunas than cars. This means that in a race between a sauna and a car, the sauna would win if the track were indoors.",
    "A bolt of lightning contains enough energy to cook 100,000 pieces of toast. No one has tried this. Everyone has thought about it.",
    "The plastic tip at the end of a shoelace is called an aglet. Its only purpose is to win trivia games.",
    "Technically, all of us are descendants of the same common ancestors, which legally makes every family reunion a reunion.",
    "The average person walks 100,000 miles in their lifetime, or about 4 times around the Earth, all without getting anywhere.",
    "Sea otters hold hands while sleeping so they don't drift apart. Scientists call this behavior 'rafting' and everyone else calls it 'the only good thing.'",
    "In 1872, a man named John Mefford invented the semicolon by accident. He was trying to make a comma and sneezed.",
    "Technically, 'W' is pronounced 'double-u' but shaped like a double-v, which means the alphabet has been lying to us since the beginning.",
    "The shortest war in history lasted 38–45 minutes. Both sides agreed it wasn't worth it but were already committed.",
    "There are more stars in the universe than grains of sand on Earth's beaches. Most of the stars don't have beaches, which is their loss.",
    "Sloths can hold their breath longer than dolphins. Sloths are doing a lot of things we didn't expect and it's time we started respecting them.",
    "Every time you shuffle a deck of cards, you almost certainly produce an order that has never existed before in history. Your shuffled deck is unique. Please do not waste it on Go Fish.",
  ];

  function pick(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  let usedAnswerIndices = [];

  function getAnswer() {
    if (usedAnswerIndices.length >= ANSWERS.length) usedAnswerIndices = [];
    let idx;
    do { idx = Math.floor(Math.random() * ANSWERS.length); } while (usedAnswerIndices.includes(idx));
    usedAnswerIndices.push(idx);
    return ANSWERS[idx];
  }

  function getResponse() {
    const roll = Math.random();
    const affirmation = pick(AFFIRMATIONS);

    // ~10% chance: site plug
    if (roll < 0.10) {
      return `${affirmation} ${pick(PLUG_RESPONSES)}`;
    }

    // ~15% chance: IDK
    if (roll < 0.25) {
      return `${affirmation} ${pick(IDK_RESPONSES)}`;
    }

    // Otherwise: affirmation + segue + answer
    return `${affirmation} ${pick(SEGUES)} ${getAnswer()}`;
  }

  const messagesEl = document.getElementById('messages');
  const inputField = document.getElementById('inputField');
  const sendBtn   = document.getElementById('sendBtn');
  const typingEl  = document.getElementById('typingIndicator');

  function appendMessage(text, role) {
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;

    const av = document.createElement('div');
    av.className = `avatar ${role === 'bot' ? 'bot-av' : 'user-av'}`;

    if (role === 'bot') {
      av.innerHTML = `<svg width="18" height="18" viewBox="0 0 44 44" fill="none">
        <ellipse cx="22" cy="27" rx="13" ry="9" fill="#2D6A4F"/>
        <ellipse cx="10" cy="22" rx="7" ry="6" fill="#2D6A4F"/>
        <ellipse cx="1.5" cy="23.2" rx="3.5" ry="1.8" fill="#235c43"/>
        <circle cx="7" cy="21" r="1.2" fill="white"/>
      </svg>`;
    } else {
      av.textContent = 'YOU';
    }

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    wrap.appendChild(av);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function sendMessage() {
    const text = inputField.value.trim();
    if (!text) return;

    appendMessage(text, 'user');
    inputField.value = '';
    inputField.style.height = 'auto';
    sendBtn.disabled = true;

    typingEl.classList.add('active');
    messagesEl.scrollTop = messagesEl.scrollHeight;

    const delay = 900 + Math.random() * 1200;
    setTimeout(() => {
      typingEl.classList.remove('active');
      appendMessage(getResponse(), 'bot');
      sendBtn.disabled = false;
      inputField.focus();
    }, delay);
  }

  sendBtn.addEventListener('click', sendMessage);

  inputField.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  inputField.addEventListener('input', () => {
    inputField.style.height = 'auto';
    inputField.style.height = Math.min(inputField.scrollHeight, 120) + 'px';
  });
</script>
</body>
</html>
